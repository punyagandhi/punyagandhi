<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 244"
     width="680" height="244">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0b2e" />
      <stop offset="100%" stop-color="#0a0414" />
    </linearGradient>

    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="680" height="244" rx="10" />
    </clipPath>
  </defs>

  <style>
    text {
      font-family: 'Courier New', monospace;
      font-size: 16px;
    }
    .rain-col {
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }
    @keyframes fall {
      from { transform: translateY(0); }
      to   { transform: translateY(686px); }
    }
  </style>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="680" height="244" fill="url(#cardBg)" />

